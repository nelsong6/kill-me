name: Snapshot & Deploy Frontend

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6:00 AM UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  tofu-outputs:
    uses: nelsong6/pipeline-templates/.github/workflows/tofu-outputs-template.yml@main
    with:
      storage_account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      state_key: kill-me.tfstate
    secrets: inherit

  generate-and-deploy:
    name: Generate Snapshot & Deploy Frontend
    needs: tofu-outputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Install snapshot dependencies
        working-directory: ./snapshot
        run: npm ci

      - name: Resolve Cosmos DB endpoint from App Config
        id: cosmos
        run: |
          ENDPOINT=$(az appconfig kv show \
            --endpoint "${{ vars.AZURE_APP_CONFIG_ENDPOINT }}" \
            --auth-mode login \
            --key cosmos_db_endpoint \
            --query value -o tsv)
          echo "::add-mask::$ENDPOINT"
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT

      - name: Generate SQLite snapshot
        working-directory: ./snapshot
        env:
          COSMOS_DB_ENDPOINT: ${{ steps.cosmos.outputs.endpoint }}
          COSMOS_DB_DATABASE_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).cosmos_db_database_name }}
          COSMOS_DB_CONTAINER_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).cosmos_db_container_name }}
        run: |
          rm -f ../frontend/public/snapshot.db
          node generate-snapshot.js --output ../frontend/public/snapshot.db

      - name: Commit snapshot.db to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/snapshot.db
          git diff --cached --quiet || git commit -m "Update snapshot.db"
          git push

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).backend_api_url }}
          VITE_MICROSOFT_CLIENT_ID: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).microsoft_login_client_id }}
        run: npm run build

      - name: Get Static Web App Token
        id: swa-token
        env:
          STATIC_WEB_APP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).static_web_app_name }}
          RESOURCE_GROUP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).resource_group_name }}
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend/dist"
          output_location: ""
          skip_app_build: true

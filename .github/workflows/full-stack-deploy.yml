name: Deploy Frontend

on:
  push:
    branches: [main]
    paths: ["frontend/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  tofu-outputs:
    uses: nelsong6/pipeline-templates/.github/workflows/tofu-outputs-template.yml@main
    with:
      storage_account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      state_key: kill-me.tfstate
    secrets: inherit

  deploy-frontend:
    name: Deploy Frontend
    needs: tofu-outputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Generate version.json
        run: |
          mkdir -p frontend/public
          echo "{\"sha\":\"${GITHUB_SHA::7}\",\"deployedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > frontend/public/version.json

      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).backend_api_url }}
          VITE_MICROSOFT_CLIENT_ID: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).microsoft_login_client_id }}
        run: |
          npm ci
          npm run build

      - name: Get Static Web App Token
        id: swa-token
        env:
          STATIC_WEB_APP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).static_web_app_name }}
          RESOURCE_GROUP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).resource_group_name }}
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend/dist"
          output_location: ""
          skip_app_build: true

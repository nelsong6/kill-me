name: Deploy

on:
  workflow_run:
    workflows: ["Phase 1 - CI Build"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ghcr.io
  # workflow_run uses the triggering workflow's SHA; workflow_dispatch uses the current SHA
  TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  tofu-outputs:
    uses: nelsong6/pipeline-templates/.github/workflows/tofu-outputs-template.yml@main
    with:
      storage_account: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      state_key: kill-me.tfstate
    secrets: inherit

  deploy-backend:
    name: Deploy Backend API
    needs: tofu-outputs
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Deploy to Container App
        env:
          CONTAINER_APP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).container_app_name }}
          RESOURCE_GROUP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).resource_group_name }}
          IMAGE_NAME: ${{ github.repository }}/${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).container_app_name }}
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --image "${{ env.REGISTRY }}/$IMAGE_NAME:${{ env.TARGET_SHA }}"

      - name: Bind Custom Domain & Generate Certificate
        env:
          CONTAINER_APP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).container_app_name }}
          RESOURCE_GROUP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).resource_group_name }}
          BACKEND_API_URL: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).backend_api_url }}
        run: |
          BACKEND_HOSTNAME="${BACKEND_API_URL#https://}"
          az containerapp hostname bind \
            --hostname "$BACKEND_HOSTNAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --name "$CONTAINER_APP_NAME" \
            --validation-method CNAME

  deploy-frontend:
    name: Deploy Frontend
    needs: tofu-outputs
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Build Frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).backend_api_url }}
          VITE_MICROSOFT_CLIENT_ID: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).microsoft_login_client_id }}
        run: |
          npm ci
          npm run build

      - name: Get Static Web App Token
        id: swa-token
        env:
          STATIC_WEB_APP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).static_web_app_name }}
          RESOURCE_GROUP_NAME: ${{ fromJSON(needs.tofu-outputs.outputs.outputs_json).resource_group_name }}
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.deployment_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend/dist"
          output_location: ""
          skip_app_build: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kill-me
  namespace: kill-me
  labels:
    app: kill-me
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kill-me
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kill-me
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: infra-shared
      containers:
        - name: kill-me
          image: romainecr.azurecr.io/kill-me:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: AZURE_APP_CONFIG_ENDPOINT
              value: https://infra-appconfig.azconfig.io
            - name: KEY_VAULT_URL
              value: https://romaine-kv.vault.azure.net/
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
